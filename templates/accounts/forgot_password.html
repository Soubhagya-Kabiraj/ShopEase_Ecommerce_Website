{% extends 'base.html' %}
{% block title %}Forgot Password — ShopEase{% endblock %}
{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="auth-card">
            <div class="auth-card-header">
                <i class="bi bi-key-fill display-6 mb-2"></i>
                <h2>Forgot Password?</h2>
                <p class="mb-0 opacity-75">Enter your email to reset</p>
            </div>
            <div class="auth-card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-600">Email Address</label>
                        <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                    </div>
                    <button type="submit" class="btn btn-primary mb-3"><i class="bi bi-send me-2"></i>Reset Password</button>
                    <p class="text-center text-muted small mb-0"><a href="{% url 'accounts:login' %}" class="text-accent">Back to Login</a></p>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
