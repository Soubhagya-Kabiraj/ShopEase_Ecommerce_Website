{% extends 'base.html' %}
{% block title %}Delete Product — ShopEase{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center"><div class="col-md-6">
        <div class="checkout-card text-center">
            <i class="bi bi-exclamation-triangle-fill text-danger display-3 mb-3"></i>
            <h3 class="fw-bold">Delete "{{ product.name }}"?</h3>
            <p class="text-muted">This action cannot be undone.</p>
            <form method="POST" class="d-flex justify-content-center gap-3 mt-3">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger px-4"><i class="bi bi-trash me-2"></i>Delete</button>
                <a href="{{ product.get_absolute_url }}" class="btn btn-outline-custom px-4">Cancel</a>
            </form>
        </div>
    </div></div>
</div>
{% endblock %}
